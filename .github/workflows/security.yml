name: Security

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    # The official Semgrep image ships the CLI and rule tooling preinstalled.
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      # Curated rulesets for this stack (Python/FastAPI backend + TS/React
      # frontend). Runs in AUDIT mode: findings are reported in the job log but
      # do NOT fail the build, so introducing SAST to an existing codebase
      # doesn't wedge CI red on day one. Once the current findings are triaged
      # (fix real ones, suppress false positives with `# nosemgrep`), add
      # `--error` below to make new findings block the merge.
      - name: Run Semgrep
        run: >-
          semgrep scan
          --config p/default
          --config p/python
          --config p/typescript
          --config p/react
          --config p/secrets
          --metrics off

  secret-scan:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so pushes/PRs are scanned across all commits, not just
          # the tip — a secret added in an earlier commit still gets caught.
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan for secrets
        run: gitleaks detect --source . --redact --verbose
